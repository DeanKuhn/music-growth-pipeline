name: Weekly Artist Snapshot

on:
  schedule:
    - cron: "0 9 * * 0"  # every Sunday at 9am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run snapshot
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python snapshot_artists.py

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Create dbt profile
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import os, urllib.parse
          url = urllib.parse.urlparse(os.environ['DATABASE_URL'])
          profile = f'''music_growth:
            outputs:
              dev:
                type: postgres
                host: {url.hostname}
                user: {url.username}
                pass: {url.password}
                port: {url.port or 5432}
                dbname: {url.path.lstrip('/')}
                schema: public
                sslmode: require
                threads: 1
            target: dev
          '''
          os.makedirs(os.path.expanduser('~/.dbt'), exist_ok=True)
          open(os.path.expanduser('~/.dbt/profiles.yml'), 'w').write(profile)
          "

      - name: Run dbt
        run: dbt run

      - name: Generate portfolio stats
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROFANITY_PATTERN: ${{ secrets.PROFANITY_PATTERN }}
        run: python generate_stats.py

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline_stats.json
          git diff --staged --quiet || git commit -m "chore: update pipeline stats"
          git push
